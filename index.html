<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>GGDROP ONLINE</title>
<style>
body{background:#0b0b0b;color:white;font-family:Arial;text-align:center}
.box{width:360px;margin:10px auto;background:#1c1c1c;padding:15px;border-radius:12px}
button{background:#ffcc00;border:none;padding:10px;border-radius:8px;margin:4px;cursor:pointer;font-weight:bold}
input{padding:8px;border-radius:8px;border:none;width:80%}
</style>
</head>
<body>

<h2>🌐 GGDROP ONLINE</h2>

<div class="box">
👤 Ник: <input id="name">
<button onclick="login()">Войти</button>
</div>

<div class="box">
💰 Баланс: <span id="bal">0</span><br>
🧑‍🚀 LVL: <span id="lvl">0</span><br>
<button onclick="openCase()">🎰 Кейc -100💰</button>
</div>

<div class="box">
<h3>🏆 Рейтинг</h3>
<div id="board"></div>
</div>

<script type="module">

// 🔥 FIREBASE (ТВОЇ ДАНІ ВЖЕ ВСТАВЛЕНІ)
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc, updateDoc, collection, getDocs } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA_uufcZcnIv7JVD1dwUGCu2okfz5J-vQw",
  authDomain: "gg-case-server.firebaseapp.com",
  projectId: "gg-case-server",
  storageBucket: "gg-case-server.firebasestorage.app",
  messagingSenderId: "616600643525",
  appId: "1:616600643525:web:8594511edc2ae576760dac"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let user = "";

// 👤 LOGIN
window.login = async function(){
user = document.getElementById("name").value;

let ref = doc(db,"players",user);
let snap = await getDoc(ref);

if(!snap.exists()){
await setDoc(ref,{
balance:300,
level:1,
spent:0
});
}

loadUser();
loadBoard();
}

// 💰 LOAD USER
async function loadUser(){
let ref = doc(db,"players",user);
let snap = await getDoc(ref);

let d = snap.data();

document.getElementById("bal").innerText = d.balance;
document.getElementById("lvl").innerText = d.level;
}

// 🎰 CASE
window.openCase = async function(){

let ref = doc(db,"players",user);
let snap = await getDoc(ref);

let d = snap.data();

if(d.balance < 100){
alert("❌ нет денег");
return;
}

let reward = Math.floor(Math.random()*200);

await updateDoc(ref,{
balance: d.balance - 100 + reward,
spent: d.spent + 100
});

loadUser();
loadBoard();
}

// 🏆 RATING
async function loadBoard(){

let snap = await getDocs(collection(db,"players"));

let arr = [];

snap.forEach(d=>{
arr.push({name:d.id,...d.data()});
});

arr.sort((a,b)=>b.balance-a.balance);

document.getElementById("board").innerHTML =
arr.slice(0,10).map((p,i)=>
`${i+1}. ${p.name} 💰${p.balance}`
).join("<br>");
}

</script>

</body>
</html>
