<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>GG Case Open</title>
  <style>
    body {
      background: #0f0f0f;
      color: white;
      font-family: Arial;
      text-align: center;
      padding-top: 100px;
    }

    .case {
      font-size: 30px;
      margin-bottom: 20px;
    }

    button {
      padding: 15px 30px;
      font-size: 18px;
      cursor: pointer;
      border: none;
      border-radius: 10px;
      background: #ffcc00;
      transition: 0.2s;
    }

    button:hover {
      transform: scale(1.05);
    }

    .result {
      margin-top: 40px;
      font-size: 26px;
      color: #00ff99;
      min-height: 40px;
    }

    .spin {
      animation: shake 0.5s infinite;
    }

    @keyframes shake {
      0% { transform: translate(1px, 1px); }
      25% { transform: translate(-2px, 2px); }
      50% { transform: translate(2px, -1px); }
      75% { transform: translate(-1px, 2px); }
      100% { transform: translate(0,0); }
    }
  </style>
</head>
<body>

  <div class="case">🎁 GG Case Open</div>

  <button onclick="openCase()">Відкрити кейс</button>

  <div class="result" id="result"></div>

  <script>
    const items = [
      "🔪 Knife (легендарний)",
      "💎 Blue Skin",
      "🎯 Rare Item",
      "🔥 Epic Drop",
      "💀 Trash Drop (не пощастило)"
    ];

    function openCase() {
      const btn = document.querySelector("button");
      const result = document.getElementById("result");

      result.innerHTML = "Відкриваємо...";
      document.body.classList.add("spin");

      btn.disabled = true;

      setTimeout(() => {
        const drop = items[Math.floor(Math.random() * items.length)];
        result.innerHTML = "Тобі випало: " + drop;

        document.body.classList.remove("spin");
        btn.disabled = false;
      }, 2000);
    }
  </script>

</body>
</html>
